<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --textarea-bg: #ffffff;
      --border-color: #eeeeee;
      --icon-hover: #f1f3f4;
      --accent-color: #1a73e8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #202124;
        --text-color: #e8eaed;
        --textarea-bg: #292a2d;
        --border-color: #3c4043;
        --icon-hover: #3c4043;
        --accent-color: #8ab4f8;
      }
    }

    body { 
      padding: 8px; /* 极窄边距 */
      margin: 0; 
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      background-color: var(--bg-color);
      color: var(--text-color);
      overflow: hidden;
    }

    /* 紧凑的顶栏 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      padding: 0 4px;
    }

    .title { font-size: 12px; font-weight: bold; opacity: 0.7; }

    .actions { display: flex; gap: 4px; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-color);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: background 0.2s;
      font-size: 14px;
    }

    .icon-btn:hover { background-color: var(--icon-hover); }

    textarea {
      flex-grow: 1;
      width: 100%;
      background-color: var(--textarea-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 8px;
      box-sizing: border-box;
      resize: none;
      font-size: 13px;
      line-height: 1.4;
      outline: none;
    }

    textarea:focus { border-color: var(--accent-color); }

    .footer {
      font-size: 10px;
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">草稿</div>
    <div class="actions">
      <button id="copyBtn" class="icon-btn" title="复制全部">📋</button>
      <button id="clearBtn" class="icon-btn" title="清空内容">🗑️</button>
    </div>
  </div>
  
  <textarea id="draft" placeholder="输入内容..."></textarea>
  
  <div class="footer">
    <span id="charCount">0 字</span>
    <span id="saveStatus">已同步</span>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
