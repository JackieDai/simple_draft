<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; height: 400px; padding: 10px; margin: 0; font-family: sans-serif; }
    textarea {
      width: 100%;
      height: 90%;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px;
      box-sizing: border-box;
      resize: none;
      font-size: 14px;
      outline: none;
    }
    .footer { font-size: 12px; color: #888; margin-top: 5px; text-align: right; }
  </style>
</head>
<body>
  <textarea id="draft" placeholder="在此输入草稿..."></textarea>
  <div class="footer">自动保存中...</div>
  <script src="popup.js"></script>
</body>
</html>
